name: Build Apps

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main]

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2

      - name: Enable desktop support
        run: flutter config --enable-${{ matrix.platform }}-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build ${{ matrix.platform }} app
        run: flutter build ${{ matrix.platform }} --release
        env:
          FLUTTER_VERSION: 'stable'

    matrix:
      include:
        - os: ubuntu-latest
          platform: linux
        - os: macos-latest
          platform: macos
        - os: windows-latest
          platform: windows

  build-mobile:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        platform: [android, ios]
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build ${{ matrix.platform }} app
        run: flutter build ${{ matrix.platform }} --release
        env:
          FLUTTER_VERSION: 'stable'
        if: matrix.platform == 'android'

      - name: Build ${{ matrix.platform }} app for simulator
        run: flutter build ios --simulator --no-codesign
        env:
          FLUTTER_VERSION: 'stable'
        if: matrix.platform == 'ios'