name: Build App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - windows
          - linux
          - macos
          - android
          - ios
        default: 'windows'

jobs:
  build-windows:
    runs-on: windows-latest
    if: github.event.inputs.platform == 'windows'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/windows/release/bundle

  build-linux:
    runs-on: ubuntu-latest
    if: github.event.inputs.platform == 'linux'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: build/linux/release/bundle

  build-macos:
    runs-on: macos-latest
    if: github.event.inputs.platform == 'macos'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/macos/release/bundle

  build-android:
    runs-on: ubuntu-latest
    if: github.event.inputs.platform == 'android'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build android --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: build/android/release/bundle

  build-ios:
    runs-on: ubuntu-latest
    if: github.event.inputs.platform == 'ios'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build ios --simulator --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/release/bundle