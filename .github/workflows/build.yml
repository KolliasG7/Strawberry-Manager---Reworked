name: Build iOS IPA

on:
  push:
    branches: ['**']  # Run on any branch
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: true
        default: 'Manual build'

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock', '**/pubspec.yaml') }}'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify Flutter setup
        run: |
          flutter doctor
          echo "Flutter version:"
          flutter --version

      - name: Check for logo file
        run: |
          if [ ! -f "assets/logo.png" ]; then
            echo " ERROR: logo.png not found in assets/"
            exit 1
          else
            echo " logo.png found"
            ls -la assets/logo.png

      - name: Generate iOS Icons
        run: |
          echo " Generating iOS app icons from custom logo..."
          flutter pub run flutter_launcher_icons:main
          if [ $? -ne 0 ]; then
            echo " ERROR: Failed to generate iOS icons"
            exit 1
          else
            echo " iOS icons generated successfully"

      - name: Verify icons were generated
        run: |
          if [ ! -d "ios/Runner/Assets.xcassets/AppIcon.appiconset" ]; then
            echo " ERROR: AppIcon.appiconset directory not found"
            exit 1
          else
            echo " AppIcon.appiconset found with icons:"
            ls -la ios/Runner/Assets.xcassets/AppIcon.appiconset/

      - name: Setup Git for GitHub API
        run: |
          echo " Configuring Git for GitHub API access..."
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Setup CocoaPods
        run: |
          echo " Setting up CocoaPods with GitHub authentication..."
          cd ios
          pod repo update
          if [ $? -ne 0 ]; then
            echo " ERROR: CocoaPods repo update failed"
            exit 1
          fi
          echo " CocoaPods setup completed"

      - name: Install CocoaPods dependencies
        run: |
          echo " Installing CocoaPods dependencies..."
          cd ios
          pod install --repo-update
          if [ $? -ne 0 ]; then
            echo " ERROR: CocoaPods install failed, retrying without repo update..."
            pod install
            if [ $? -ne 0 ]; then
              echo " ERROR: CocoaPods install failed completely"
              exit 1
            fi
          fi
          echo " CocoaPods dependencies installed successfully"

      - name: Build iOS (no code signing)
        run: |
          echo " Building iOS app..."
          flutter build ios --release --no-codesign
          if [ $? -ne 0 ]; then
            echo " ERROR: Flutter build failed"
            exit 1
          else
            echo " Flutter build completed successfully"

      - name: Verify build output
        run: |
          if [ ! -f "build/ios/iphoneos/Runner.app" ]; then
            echo " ERROR: Runner.app not found"
            exit 1
          else
            echo " Runner.app found successfully"

      - name: Package into IPA
        run: |
          echo " Packaging IPA..."
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          if [ $? -ne 0 ]; then
            echo " ERROR: Failed to copy Runner.app"
            exit 1
          else
            echo " Runner.app copied successfully"

          zip -r Strawberry-Manager.ipa Payload/
          if [ $? -ne 0 ]; then
            echo " ERROR: Failed to create IPA"
            exit 1
          else
            echo " IPA created successfully"
            ls -la Strawberry-Manager.ipa

          rm -rf Payload/

      - name: Verify IPA creation
        run: |
          if [ ! -f "Strawberry-Manager.ipa" ]; then
            echo " ERROR: IPA file not found"
            exit 1
          else
            echo " IPA verified successfully"
            echo " IPA size:"
            du -h Strawberry-Manager.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Strawberry-Manager-IPA
          path: Strawberry-Manager.ipa
          retention-days: 30

      - name: Build Summary
        run: |
          echo " Build completed successfully!"
          echo " App: Strawberry Manager"
          echo " Flutter: 3.27.4"
          echo " Artifact: Strawberry-Manager.ipa"
