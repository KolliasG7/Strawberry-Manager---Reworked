# XcodeGen configuration for Strawberry Manager iOS
name: StrawberryManager

options:
  bundleIdPrefix: com.github.strawberrymanager
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    PRODUCT_NAME: StrawberryManager
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO  
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.0"
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  StrawberryManager:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    sources:
      - StrawberryManagerApp.swift
      - Models
      - ViewModels  
      - Views
      - Services
      - Utilities
      - Theme
      - path: Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.strawberrymanager.ios
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
